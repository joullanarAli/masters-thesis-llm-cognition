<!DOCTYPE html>
<html>
<head>
    <title>Thesis Evaluation - Participant Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 3rem; }
        .container { max-width: 600px; }
        .card { border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-body p-4">
                <h2 class="card-title text-center mb-4">🧠 Research Participant Profile</h2>
                <p class="text-muted text-center mb-4">
                    This information helps us understand how developer experience affects code evaluation.
                    All data is anonymous and used only for academic research.
                </p>
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Name (Optional - can be pseudonym)</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g., Developer_01 or Anonymous">
                        <small class="text-muted">Used only to track your progress across sessions</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Professional Role</label>
                        <select name="expertise_level" class="form-select" required>
                            <option value="">Select...</option>
                            <option value="student_bachelor">Bachelor's Student</option>
                            <option value="student_master">Master's Student</option>
                            <option value="student_phd">PhD Student</option>
                            <option value="junior">Junior Developer (0-2 years)</option>
                            <option value="mid">Mid-Level Developer (3-5 years)</option>
                            <option value="senior">Senior Developer (6+ years)</option>
                            <option value="lead">Tech Lead / Architect</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Years of Programming Experience</label>
                        <input type="number" name="programming_years" class="form-control" min="0" max="50" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">How often do you use AI coding assistants?</label>
                        <select name="ai_usage_frequency" class="form-select" required>
                            <option value="">Select...</option>
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                            <option value="rarely">Rarely</option>
                            <option value="never">Never used</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Primary Programming Languages (comma-separated)</label>
                        <input type="text" name="languages" class="form-control" placeholder="e.g., Python, Java, JavaScript">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2">Start Evaluation →</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
