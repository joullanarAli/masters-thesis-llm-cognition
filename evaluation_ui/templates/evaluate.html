<!DOCTYPE html>
<html>
<head>
    <title>Thesis Evaluation: Problem {{ problem_index + 1 }}/{{ total }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/default.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        .container { max-width: 900px; margin: auto; }
        .problem, .code { border: 1px solid #ccc; padding: 20px; margin: 20px 0; border-radius: 5px; }
        .code { background: #f5f5f5; font-family: monospace; white-space: pre-wrap; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        .nav { margin-top: 20px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Thesis Code Evaluation</h2>
        <p>Problem {{ problem_index + 1 }} of {{ total }}</p>

        <div class="problem">
            <h3>Problem Prompt:</h3>
            <p>{{ problem['problem_prompt'] }}</p>
        </div>

        <div class="code">
            <h3>AI-Generated Solution:</h3>
            <pre><code class="language-python">{{ problem['generated_code'] }}</code></pre>
        </div>

        <form method="POST">
            <div class="form-group">
                <label>Correctness (1-5):</label>
                <select name="correctness" required>
                    <option value="">Select...</option>
                    {% for i in range(1, 6) %}
                    <option value="{{ i }}" {% if prev_eval.correctness == i %}selected{% endif %}>{{ i }} - {% if i==1 %}Completely Wrong{% elif i==5 %}Perfect{% endif %}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Readability (1-5):</label>
                <select name="readability" required>
                    <option value="">Select...</option>
                    {% for i in range(1, 6) %}
                    <option value="{{ i }}" {% if prev_eval.readability == i %}selected{% endif %}>{{ i }} - {% if i==1 %}Very Poor{% elif i==5 %}Excellent{% endif %}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Would you use this code?</label>
                <select name="intention_to_use" required>
                    <option value="">Select...</option>
                    <option value="yes" {% if prev_eval.intention_to_use == 'yes' %}selected{% endif %}>Yes, as is</option>
                    <option value="modified" {% if prev_eval.intention_to_use == 'modified' %}selected{% endif %}>Yes, with modifications</option>
                    <option value="no" {% if prev_eval.intention_to_use == 'no' %}selected{% endif %}>No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Comments (Optional):</label>
                <textarea name="comments" rows="3">{{ prev_eval.comments or '' }}</textarea>
            </div>

            <div class="nav">
                {% if problem_index > 0 %}
                <a href="{{ url_for('evaluate', problem_index=problem_index-1) }}">Previous Problem</a>
                {% else %}
                <span></span>
                {% endif %}
                <button type="submit">Submit & Next Problem</button>
            </div>
        </form>
    </div>
</body>
</html>
