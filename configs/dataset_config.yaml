dataset:
  raw_path: "data/raw/codege-perceiving"
  processed_path: "data/processed"
  
  csv_columns:
    question: "question"
    answer: "ans_gt"
    question_id: "ID"
    clean_question: "clean_question"
    
  evaluation_scores:
    understanding: "consistent"
    agreement: "correct"
    usefulness: "useful"
    scale_range: [-2, 2]
    
  models:
    categories:
      - "T2C-CONALA"  # Code generation on CoNaLa
      - "T2C-SO"      # Code generation on Stack Overflow
      - "T2T"         # Text-to-text
    variants:
      - "VANILLA"
      - "FINETUNED-CONALA"
      - "FINETUNED-SO"
      - "COPILOT"